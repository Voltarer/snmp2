###########################################################################
# my_agent.conf - конфигурация для встраиваемого SNMP агента
###########################################################################
# -------------------------------------------------------------------------
# 1. Определяем MIB-представление (View), которое включает наше частное дерево
# -------------------------------------------------------------------------
# Вариант A: Включаем всё поддерево enterprises (1.3.6.1.4.1)
view myview included .1.3.6.1.4.1

# Вариант B: Включаем только вашу конкретную ветку (рекомендуется для безопасности)
# view myview included .1.3.6.1.4.1.9999

# -------------------------------------------------------------------------
# 2. Назначаем доступ для community "public"
# -------------------------------------------------------------------------
# Разрешаем только чтение (rocommunity) для всех хостов (default)
# и привязываем к определённой view (-V myview)
rocommunity public default -V myview

# Если нужен доступ с определённого IP-адреса, укажите его вместо default:
# rocommunity public 192.168.1.0/24 -V myview

# -------------------------------------------------------------------------
# 3. Дополнительные настройки (необязательно)
# -------------------------------------------------------------------------
# Системная информация (будет видна в .1.3.6.1.2.1.1)
sysLocation   "Embedded MIPS Device"
sysContact    "admin@example.com"
sysName       "my-device"

# Если вы используете AgentX для связи с мастер-агентом (не обязательно)
master agentx

# -------------------------------------------------------------------------
# 4. Отладка (можно включить для проверки загрузки конфига)
# -------------------------------------------------------------------------
# logFile /var/log/snmpd.log
# debugDumpConfig 1